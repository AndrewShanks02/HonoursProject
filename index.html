<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./CSS/style.css"></style>
    <title>FA Sim</title>
</head>
<body style="overflow:hidden">
    <div id="main" style="position:absolute; display: block; width:100%; height:100%;">
        <div id="topbar" class="topbar">
            <div class="topelem displayelem" style="margin-top:20px;">
                File &#9660;
                <div class="displayelem-contents">
                    <a class="display-item" onclick="newFA()">New</a>
                    <a class="display-item" onclick="saveFA(currentFA)">Save</a>
                    <a class="display-item" onclick="openFA()">Open</a>
                    <a class="display-item" onclick="saveCopyFA(currentFA)">Save Copy</a>
                    <a class="display-item" onclick="deleteFA(currentFA.name)">Delete</a>
                </div>
            </div>
            <div class="topelem displayelem" style="margin-top:20px;">
                Edit &#9660;
                <div class="displayelem-contents">
                    <div class="displayelem">
                        <a class="display-item">Unary</a>
                        <div class="displayelem-contents right-contents">
                            <a class="display-item" onclick="applyUnary(complement)">Negation</a>
                            <a class="display-item" onclick="applyUnary(star)">Star</a>
                            <a class="display-item" onclick="applyUnary(plus)">Plus</a>
                        </div>
                    </div>
                    <div class="displayelem">
                        <a class="display-item">Binary</a>
                        <div class="displayelem-contents right-contents">
                            <a class="display-item" onclick="getChoice(union)">Union</a>
                            <a class="display-item" onclick="getChoice(intersection)">Intersection</a>
                            <a class="display-item" onclick="getChoice(concatenation)">Concatenation</a>
                            <a class="display-item" onclick="getChoice(difference)">Difference</a>
                        </div>
                    </div>
                </div>
            </div>
            <input id="name-box" placeholder="New FA" type="text" style="height:15px; margin-top:40px; margin-left:350px; text-align: center;">

            <!-- <div id="save-modal">
                <a>Lorem ipsum dolor sit amet consectetur adipisicing elit. Suscipit aspernatur odit soluta dolore quae illum sapiente tenetur quod assumenda modi minus quos quas iusto ipsam distinctio, vel vero sequi corporis.</a>
            </div> -->
        </div>
        <div class="flex-container" style="height:100%;">
            <div class="flex-child leftbar">
                <img class="side-button" src="./Assets/nodeTool.png" style="margin-left:13px;" onclick="addState()" />
                <img class="side-button" id="transition-tool" src="./Assets/transitionTool.png" style="margin-left:13px;"/>
                <img class="side-button button-selected" id="selection-tool"src="./Assets/selectTool.png" style="margin-left:13px;"/>
                <br /> <br />
                <input id="string-box" placeholder="word" type="text" style="width:130px; margin-left:8px;">
                <button id="execute-button" style="margin-left: 45px;">Execute</button>
            </div>
            <div class="flex-child canvas">
                <div id="context-menu" style="display: none; position:absolute;">
                    <ul>
                        <li id="delete-button-ctx" class="context-list node-operation edge-operation">Delete</li>
                        <li id="final-button-ctx" class="context-list node-operation">Toggle final</li>
                        <li id="initial-button-ctx" class="context-list node-operation">Set initial</li>
                        <li id="transition-button-ctx" class="context-list edge-operation">Set transition char.</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    
    <script type="text/javascript" src="./JS/jquery-4.0.0.min.js"></script>
    <script type="text/javascript" src="./JS/two.js"></script>
    <script type="text/javascript" src="./JS/draw.js"></script>
    <script type="text/javascript" src="./JS/FA.js"></script>
    <script type="text/javascript" src="./JS/operations.js"></script>
    <script type="text/javascript" src="./JS/fileOps.js"></script>
</body>
</html>
